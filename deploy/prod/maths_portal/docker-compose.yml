version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    image: maths-portal/backend:prod
    container_name: maths_portal_backend
    environment:
      SERVE_STATIC: "false"
      STATIC_BASE_URL: /content
      CONTENT_ROOT: /site
      CORS_ORIGINS: '["https://maths.labomaths.tn"]'
      DATABASE_URL: "sqlite:////data/app.db"
      SECRET_KEY: "${MATHS_PORTAL_SECRET_KEY:-change-me-in-production}"
      APP_ENV: "production"
      TESTING: "0"
      AUTO_BOOTSTRAP: "1"
      TEACHER_EMAILS: '["alaeddine.benrhouma@ert.tn"]'
    volumes:
      - /var/www/maths:/site:ro
      - maths_portal_data:/data
    ports:
      - "127.0.0.1:8002:8000"
    restart: unless-stopped

volumes:
  maths_portal_data:
    name: maths_portal_data

networks:
  default:
    name: maths_portal_network
